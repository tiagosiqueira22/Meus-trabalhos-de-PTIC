<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Arquivos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    color:white;
    overflow:hidden;
}

.background{
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 20%, rgba(59,130,246,.3), transparent 25%),
    radial-gradient(circle at 80% 70%, rgba(139,92,246,.3), transparent 25%);
    filter: blur(30px);
}

.container{
    position:relative;
    z-index:1;
    text-align:center;
    padding:50px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
    max-width:700px;
    width:90%;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
    background:linear-gradient(90deg,#60a5fa,#a78bfa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    color:#cbd5e1;
    margin-bottom:35px;
    font-size:1.1rem;
    line-height:1.6;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.btn{
    text-decoration:none;
    color:white;
    font-weight:600;
    padding:16px 32px;
    border-radius:15px;
    transition:all .3s ease;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    box-shadow:0 10px 25px rgba(59,130,246,.3);
}

.btn:hover{
    transform:translateY(-5px) scale(1.05);
    box-shadow:0 15px 35px rgba(139,92,246,.5);
}

@media(max-width:600px){
    h1{
        font-size:2.2rem;
    }

    .buttons{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="background"></div>

<div class="container">
    <h1>Arquivos Disponíveis</h1>

    <p>
        Clique em um dos botões abaixo para acessar os documentos.
    </p>

    <div class="buttons">
        <a href="apresentacao.pptx" class="btn">
            📊 Apresentação
        </a>

        <a href="pilares-pensamento.docx" class="btn">
            📄 Pilares do Pensamento
        </a>
    </div>
</div>

</body>
</html>
